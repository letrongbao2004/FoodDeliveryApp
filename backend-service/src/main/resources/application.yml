spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  datasource:
    url: jdbc:mysql://localhost:3306/food_delivery?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
  error:
    whitelabel:
      enabled: false

app:
  jwt:
    # In production, set via env var: APP_JWT_SECRET
    secret: ${APP_JWT_SECRET:dev-secret-change-me}
    issuer: ${APP_JWT_ISSUER:food-delivery-api}
    expiresMinutes: 43200 # 30 days

cloudinary:
  url: ${CLOUDINARY_URL:}
  folder: ${CLOUDINARY_FOLDER:food-delivery}
